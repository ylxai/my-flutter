name: filecopy_utility
description: "Hafiportrait Manager — professional file copy utility with high-performance I/O"
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^3.2.1
  
  # File Operations
  file_picker: ^10.3.10
  desktop_drop: ^0.7.0
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # UI
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  
  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^10.0.0
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.5.3
  
  # Rust FFI bridge
  flutter_rust_bridge: ^2.11.1
  
  # Cloud Upload (Hybrid Upload System)
  minio: ^3.5.8
  googleapis: ^16.0.0
  # googleapis_auth 2.x tidak kompatibel dengan Flutter SDK saat ini (meta 1.17.0 vs ^1.18.1)
  # Tetap di 1.6.0 hingga Flutter SDK diupdate dengan meta >=1.18.1
  googleapis_auth: ^1.6.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
