name: Flutter Build & Test

# ──────────────────────────────────────────────────────────────────────────────
# Trigger: push/PR ke main atau master, dan manual dispatch
# ──────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

# Batalkan run lama jika ada push baru di branch yang sama
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.0"
  RUST_TOOLCHAIN: "1.93.0"
  FRB_CODEGEN_VERSION: "2.9.0"

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1: Quality Gate — format, lint, analyze, test (Linux only, cepat)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  quality:
    name: Quality Gate (Format + Lint + Analyze + Test)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # ── Rust Setup ────────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ubuntu-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ubuntu-cargo-

      - name: Cache flutter_rust_bridge_codegen binary
        id: cache-frb
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/flutter_rust_bridge_codegen
          key: ubuntu-frb-${{ env.FRB_CODEGEN_VERSION }}

      - name: Install flutter_rust_bridge_codegen
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen@${{ env.FRB_CODEGEN_VERSION }} --locked

      # ── Flutter Setup ─────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Flutter pub get
        run: flutter pub get

      # ── Format Checks ─────────────────────────────────────────────────────
      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Rust fmt check
        working-directory: rust
        run: cargo fmt --all -- --check

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: Rust clippy
        working-directory: rust
        run: |
          cargo clippy --all-targets --all-features -- \
            -D warnings \
            -A dead_code

      # ── Generate Rust Bridge SEBELUM analyze & test ───────────────────────
      # FIX #1: generate harus SEBELUM analyze agar frb_generated.dart sinkron
      - name: Generate Rust Bridge
        run: flutter_rust_bridge_codegen generate

      # ── Analyze & Test ────────────────────────────────────────────────────
      - name: Flutter analyze
        run: flutter analyze

      - name: Rust tests
        working-directory: rust
        run: cargo test --all

      - name: Flutter tests
        run: flutter test

# ──────────────────────────────────────────────────────────────────────────────
# JOB 2: Build Linux — hanya jalan setelah quality gate pass
# ──────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (Release)
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ubuntu-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ubuntu-cargo-

      - name: Cache flutter_rust_bridge_codegen binary
        id: cache-frb
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/flutter_rust_bridge_codegen
          key: ubuntu-frb-${{ env.FRB_CODEGEN_VERSION }}

      - name: Install flutter_rust_bridge_codegen
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen@${{ env.FRB_CODEGEN_VERSION }} --locked

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Install system dependencies (Linux)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Rust Bridge
        run: flutter_rust_bridge_codegen generate

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundle-${{ github.sha }}
          path: build/linux/x64/release/bundle/
          retention-days: 7

# ──────────────────────────────────────────────────────────────────────────────
# JOB 3: Build Windows — hanya jalan setelah quality gate pass
# ──────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (Release)
    runs-on: windows-latest
    needs: quality
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: windows-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Cache flutter_rust_bridge_codegen binary
        id: cache-frb
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/flutter_rust_bridge_codegen.exe
          key: windows-frb-${{ env.FRB_CODEGEN_VERSION }}

      - name: Install flutter_rust_bridge_codegen
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: cargo install flutter_rust_bridge_codegen@${{ env.FRB_CODEGEN_VERSION }} --locked

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Rust Bridge
        run: flutter_rust_bridge_codegen generate

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ github.sha }}
          path: build/windows/runner/Release/
          retention-days: 7
