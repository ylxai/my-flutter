name: Release — Build, Package & Publish

# ─────────────────────────────────────────────────────────────────────────────
# Trigger: push tag v* (contoh: v1.2.0, v2.0.0-beta.1)
# Hasil: GitHub Release dengan 4 artifact:
#   - hafiportrait-manager-{version}-linux-x64.tar.gz  (portable)
#   - hafiportrait-manager-{version}-linux-x64.deb     (Debian/Ubuntu)
#   - hafiportrait-manager-{version}-windows-x64.zip   (portable)
#   - hafiportrait-manager-setup-{version}-windows-x64.exe (NSIS installer)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.41.0"
  RUST_TOOLCHAIN: "1.93.0"
  FRB_CODEGEN_VERSION: "2.9.0"
  APP_NAME: "hafiportrait-manager"
  APP_DISPLAY_NAME: "Hafiportrait Manager"
  APP_ID: "com.hafiportrait.manager"
  MAINTAINER: "Hafiportrait <admin@hafiportrait.com>"

jobs:
# ─────────────────────────────────────────────────────────────────────────────
# JOB 1: Build Linux — tar.gz + .deb
# ─────────────────────────────────────────────────────────────────────────────
  release-linux:
    name: Release Linux (tar.gz + .deb)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ubuntu-cargo-release-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ubuntu-cargo-

      - name: Cache frb + cargo-expand binaries
        id: cache-frb
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/flutter_rust_bridge_codegen
            ~/.cargo/bin/cargo-expand
          key: ubuntu-frb-${{ env.FRB_CODEGEN_VERSION }}-expand-1

      - name: Install frb + cargo-expand
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: |
          cargo install flutter_rust_bridge_codegen@${{ env.FRB_CODEGEN_VERSION }} --locked
          cargo install cargo-expand --locked

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux Desktop
        run: flutter config --enable-linux-desktop

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsecret-1-dev libjsoncpp-dev \
            dpkg-dev fakeroot

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Rust Bridge
        run: flutter_rust_bridge_codegen generate

      - name: Build Linux Release
        run: flutter build linux --release

      # ── Package: tar.gz portable ────────────────────────────────────────
      - name: Package Linux tar.gz
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          BUNDLE_DIR="build/linux/x64/release/bundle"
          TAR_NAME="${{ env.APP_NAME }}-${VERSION}-linux-x64.tar.gz"

          tar -czf "$TAR_NAME" -C "$(dirname $BUNDLE_DIR)" "$(basename $BUNDLE_DIR)"
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_ENV

      # ── Package: .deb ───────────────────────────────────────────────────
      - name: Package Linux .deb
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APP="${{ env.APP_NAME }}"
          DEB_DIR="deb_build"
          INSTALL_DIR="$DEB_DIR/usr/lib/$APP"
          DESKTOP_DIR="$DEB_DIR/usr/share/applications"
          BIN_DIR="$DEB_DIR/usr/bin"
          CONTROL_DIR="$DEB_DIR/DEBIAN"

          # Buat struktur direktori .deb
          mkdir -p "$INSTALL_DIR" "$DESKTOP_DIR" "$BIN_DIR" "$CONTROL_DIR"

          # Copy bundle
          cp -r build/linux/x64/release/bundle/. "$INSTALL_DIR/"

          # Hitung installed size (dalam KB)
          INSTALLED_SIZE=$(du -sk "$INSTALL_DIR" | cut -f1)

          # DEBIAN/control
          cat > "$CONTROL_DIR/control" << EOF
          Package: $APP
          Version: $VERSION
          Section: graphics
          Priority: optional
          Architecture: amd64
          Installed-Size: $INSTALLED_SIZE
          Maintainer: ${{ env.MAINTAINER }}
          Description: ${{ env.APP_DISPLAY_NAME }}
           Professional photo file copy utility with high-performance Rust backend.
           Supports RAW and JPEG copy with parallel processing, R2 and Google Drive
           upload, and WebP thumbnail generation.
          EOF

          # Wrapper script di /usr/bin
          cat > "$BIN_DIR/$APP" << 'EOF'
          #!/bin/bash
          exec /usr/lib/hafiportrait-manager/filecopy_utility "$@"
          EOF
          chmod +x "$BIN_DIR/$APP"

          # .desktop file untuk app launcher
          cat > "$DESKTOP_DIR/$APP.desktop" << EOF
          [Desktop Entry]
          Name=${{ env.APP_DISPLAY_NAME }}
          Comment=Professional photo file copy utility
          Exec=/usr/bin/$APP
          Icon=/usr/lib/$APP/data/flutter_assets/assets/images/logo.png
          Type=Application
          Categories=Graphics;Photography;
          StartupNotify=true
          EOF

          # DEBIAN/postinst — update desktop database
          cat > "$CONTROL_DIR/postinst" << 'EOF'
          #!/bin/bash
          set -e
          update-desktop-database /usr/share/applications || true
          EOF
          chmod 755 "$CONTROL_DIR/postinst"

          # Build .deb
          DEB_NAME="${APP}-${VERSION}-linux-amd64.deb"
          fakeroot dpkg-deb --build "$DEB_DIR" "$DEB_NAME"
          echo "DEB_NAME=$DEB_NAME" >> $GITHUB_ENV

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ env.TAR_NAME }}
            ${{ env.DEB_NAME }}
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2: Build Windows — .zip + NSIS .exe installer
# ─────────────────────────────────────────────────────────────────────────────
  release-windows:
    name: Release Windows (.zip + NSIS .exe)
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          target: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: windows-cargo-release-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Cache frb + cargo-expand binaries
        id: cache-frb
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/flutter_rust_bridge_codegen.exe
            ~/.cargo/bin/cargo-expand.exe
          key: windows-frb-${{ env.FRB_CODEGEN_VERSION }}-expand-1

      - name: Install frb + cargo-expand
        if: steps.cache-frb.outputs.cache-hit != 'true'
        run: |
          cargo install flutter_rust_bridge_codegen@${{ env.FRB_CODEGEN_VERSION }} --locked
          cargo install cargo-expand --locked

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Rust Bridge
        run: flutter_rust_bridge_codegen generate

      - name: Build Windows Release
        run: flutter build windows --release

      # ── Package: .zip portable ──────────────────────────────────────────
      - name: Package Windows ZIP
        shell: bash
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ZIP_NAME="${{ env.APP_NAME }}-${VERSION}-windows-x64.zip"
          cd build/windows/x64/runner/Release
          7z a -tzip "../../../../../$ZIP_NAME" .
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      # ── Package: NSIS .exe installer ───────────────────────────────────
      # NSIS sudah pre-installed di windows-latest runner — tidak perlu choco
      # Ref: https://github.com/actions/runner-images/blob/main/images/windows/Windows2022-Readme.md
      - name: Verify NSIS
        shell: pwsh
        run: |
          $nsisPath = "C:\Program Files (x86)\NSIS\makensis.exe"
          if (Test-Path $nsisPath) {
            Write-Host "✅ NSIS found: $nsisPath"
            & $nsisPath /VERSION
          } else {
            # Fallback: install via choco jika tidak ada
            Write-Host "NSIS not pre-installed, installing via choco..."
            choco install nsis -y --no-progress --ignore-package-exit-codes
          }

      - name: Build NSIS Installer
        shell: pwsh
        run: |
          $VERSION = "${{ steps.version.outputs.VERSION }}"

          # Copy release files ke folder yang NSIS harapkan
          New-Item -ItemType Directory -Force -Path "windows\installer\release" | Out-Null
          Copy-Item -Recurse -Force "build\windows\x64\runner\Release\*" "windows\installer\release\"

          # Cari makensis.exe — choco install nsis ke beberapa lokasi yang mungkin
          $candidates = @(
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe",
            "C:\ProgramData\chocolatey\bin\makensis.exe"
          )
          $makensis = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $makensis) {
            $makensis = (Get-Command makensis -ErrorAction SilentlyContinue)?.Source
          }
          if (-not $makensis) {
            Write-Error "makensis.exe tidak ditemukan setelah choco install nsis!"
            exit 1
          }
          Write-Host "Using makensis: $makensis"

          # Jalankan makensis dengan PowerShell — tidak ada konversi path Git Bash
          Push-Location "windows\installer"
          & $makensis /DVERSION=$VERSION hafiportrait.nsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Pop-Location

          # Pindahkan .exe ke root
          $EXE_NAME = "hafiportrait-manager-setup-${VERSION}-windows-x64.exe"
          $exeFile = Get-ChildItem "windows\installer\*.exe" | Select-Object -First 1
          if ($exeFile) {
            Move-Item $exeFile.FullName $EXE_NAME
          }
          "EXE_NAME=$EXE_NAME" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages-${{ steps.version.outputs.VERSION }}
          path: |
            ${{ env.ZIP_NAME }}
            ${{ env.EXE_NAME }}
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3: Publish GitHub Release — setelah Linux + Windows selesai
# ─────────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release-linux, release-windows]
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages-${{ steps.version.outputs.VERSION }}
          path: dist/

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: windows-packages-${{ steps.version.outputs.VERSION }}
          path: dist/

      - name: List dist artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ env.APP_DISPLAY_NAME }} v${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## 📦 ${{ env.APP_DISPLAY_NAME }} v${{ steps.version.outputs.VERSION }}

            Professional photo file copy utility with high-performance Rust backend.

            ---

            ## 🖥️ Installation

            ### Linux (Ubuntu/Debian)
            ```bash
            # Option 1: Install .deb package (recommended)
            sudo dpkg -i ${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-linux-amd64.deb

            # Option 2: Portable tar.gz
            tar -xzf ${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-linux-x64.tar.gz
            cd bundle && ./filecopy_utility
            ```

            ### Windows
            ```
            # Option 1: NSIS Installer (recommended)
            Run: hafiportrait-manager-setup-${{ steps.version.outputs.VERSION }}-windows-x64.exe

            # Option 2: Portable ZIP
            Extract: ${{ env.APP_NAME }}-${{ steps.version.outputs.VERSION }}-windows-x64.zip
            Run: hafiportrait_manager.exe
            ```

            ---

            ## 📋 System Requirements
            | Platform | Requirement |
            |----------|-------------|
            | Linux | Ubuntu 20.04+ / Debian 11+ (amd64) |
            | Windows | Windows 10/11 (x64) |

          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.zip
            dist/*.exe
